name: Enforce Feature Branch Policy

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  validate-branch-policy:
    name: Validate Branch Policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check source branch name format
        id: check-branch-name
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          echo "Source branch: $SOURCE_BRANCH"

          if [[ ! "$SOURCE_BRANCH" =~ ^(feat|fix|build|chore|ci|docs|perf|refactor|revert|style|test|claude|codex|dependabot)/.+ ]]; then
                echo "::error::Branch '$SOURCE_BRANCH' does not follow the required naming convention."
                echo "::error::PRs to main must come from a branch named: <type>/<name>"
                echo "::error::Valid types: feat, fix, build, chore, ci, docs, perf, refactor, revert, style, test, claude, codex"
                exit 1
              fi

          echo "Branch name '$SOURCE_BRANCH' is valid."

      - name: Check branch was created from main
        id: check-branch-origin
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"

          git fetch origin main
          git fetch origin "$SOURCE_BRANCH"

          MERGE_BASE=$(git merge-base origin/main "origin/$SOURCE_BRANCH")
          echo "Merge base commit: $MERGE_BASE"

          # Verify the merge base exists in the history of origin/main
          if git merge-base --is-ancestor "$MERGE_BASE" origin/main && \
             git merge-base --is-ancestor origin/main "$MERGE_BASE" 2>/dev/null; then
            # merge base IS the tip of main: branch was cut directly from main
            echo "Branch '$SOURCE_BRANCH' was created directly from the tip of main. OK."
          else
            # merge base must still be reachable from main (not from another branch)
            if ! git merge-base --is-ancestor "$MERGE_BASE" origin/main; then
              echo "::error::Branch '$SOURCE_BRANCH' was not created from main."
              echo "::error::The feature branch must be branched off from the main branch."
              exit 1
            fi
            echo "Branch '$SOURCE_BRANCH' originates from a commit on main. OK."
          fi
