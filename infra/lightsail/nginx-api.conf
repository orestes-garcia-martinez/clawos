# nginx-api.conf — ClawOS Agent API reverse proxy
#
# Place at: /etc/nginx/sites-available/clawos-api
# Enable:   sudo ln -s /etc/nginx/sites-available/clawos-api \
#                      /etc/nginx/sites-enabled/clawos-api
#
# Prerequisites (done by setup-nginx.sh):
#   - Nginx installed
#   - Certbot installed and certificate issued for API_DOMAIN
#   - Lightsail firewall ports 80 + 443 open
#
# After editing this file, run: sudo nginx -t && sudo systemctl reload nginx

# Redirect all HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name API_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS termination → proxy to Hono on localhost:3001
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name API_DOMAIN;

    # Certbot-managed certificates — updated automatically by certbot renew
    ssl_certificate     /etc/letsencrypt/live/API_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/API_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header X-Frame-Options           DENY                                            always;
    add_header Referrer-Policy           "no-referrer"                                   always;

    # Proxy to Hono API — keep SSE alive
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # SSE requires these headers to be cleared
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Generous timeouts for long-running AI job searches (can take 30–60 s)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;

        # Disable buffering so SSE events are flushed immediately to the browser
        proxy_buffering     off;
        proxy_cache         off;
    }
}
